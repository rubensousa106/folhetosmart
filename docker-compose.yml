# =====================================================================
# FolhetoSmart — stack de desenvolvimento local
# =====================================================================
services:

  postgres:
    image: postgres:16-alpine
    container_name: folhetosmart-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-folhetosmart}
      POSTGRES_USER: ${POSTGRES_USER:-folheto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-folheto}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql só corre quando o volume está vazio (primeiro arranque).
      # As migrações Flyway do backend são a fonte de verdade do schema.
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-folheto} -d ${POSTGRES_DB:-folhetosmart}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: folhetosmart-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # BD local: o container "postgres" deste compose (NUNCA a BD do Render).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-folhetosmart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-folheto}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-folheto}
      FOLHETO_JWT_SECRET: ${FOLHETO_JWT_SECRET}
      # Conta de administrador criada no arranque (endpoints só-ADMIN).
      FOLHETO_ADMIN_EMAIL: ${FOLHETO_ADMIN_EMAIL:-}
      FOLHETO_ADMIN_PASSWORD: ${FOLHETO_ADMIN_PASSWORD:-}
      # R2: o backend assina os URLs de upload de folhetos (flyer-upload-url).
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-folhetosmart}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    ports:
      - "8080:8080"

  # Produtor de folhetos (on-demand, não fica sempre a correr). Usa-se com:
  #   docker compose run --rm scraper python drive_producer.py
  #   docker compose run --rm scraper python normalize_products.py
  #   docker compose run --rm scraper python rotate_r2.py
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: folhetosmart-scraper
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgresql://${POSTGRES_USER:-folheto}:${POSTGRES_PASSWORD:-folheto}@postgres:5432/${POSTGRES_DB:-folhetosmart}
      # Cloudflare R2 — origem dos PDFs e destino do feed normalizado.
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-folhetosmart}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      FOLHETO_BACKEND_URL: ${FOLHETO_BACKEND_URL:-http://backend:8080}
      FOLHETO_ADMIN_EMAIL: ${FOLHETO_ADMIN_EMAIL:-}
      FOLHETO_ADMIN_PASSWORD: ${FOLHETO_ADMIN_PASSWORD:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIALS_JSON: ${FCM_CREDENTIALS_JSON:-}
      # Rede com inspeção TLS (apenas dev — nunca em produção).
      FOLHETO_INSECURE_TLS: ${FOLHETO_INSECURE_TLS:-0}

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: folhetosmart-pgadmin
    profiles: ["tools"]            # só arranca com: docker compose --profile tools up
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@folhetosmart.pt
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
