# =====================================================================
# FolhetoSmart — stack de desenvolvimento local
# =====================================================================
services:

  postgres:
    image: postgres:16-alpine
    container_name: folhetosmart-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-folhetosmart}
      POSTGRES_USER: ${POSTGRES_USER:-folheto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-folheto}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql só corre quando o volume está vazio (primeiro arranque).
      # As migrações Flyway do backend são a fonte de verdade do schema.
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-folheto} -d ${POSTGRES_DB:-folhetosmart}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: folhetosmart-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # BD local: o container "postgres" deste compose (NUNCA a BD do Render).
      # As credenciais vêm do .env (mesmas do serviço postgres acima).
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d8o0vl8k1i2s73dpean0-a/folhetosmart
      SPRING_DATASOURCE_USERNAME: folhetosmart_user
      SPRING_DATASOURCE_PASSWORD: lwWwXxuxTX86oukR4qGgLlrEcq3g6v2S
      FOLHETO_JWT_SECRET: ${FOLHETO_JWT_SECRET}
      FOLHETO_SCRAPER_URL: http://scraper:8090
      # Conta de administrador criada no arranque (endpoints só-ADMIN).
      FOLHETO_ADMIN_EMAIL: ${FOLHETO_ADMIN_EMAIL:-}
      FOLHETO_ADMIN_PASSWORD: ${FOLHETO_ADMIN_PASSWORD:-}
    ports:
      - "8080:8080"

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: folhetosmart-scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgresql://${POSTGRES_USER:-folheto}:${POSTGRES_PASSWORD:-folheto}@postgres:5432/${POSTGRES_DB:-folhetosmart}
      WORKER_PORT: "8090"
      ALDI_DISTRICT: ${ALDI_DISTRICT:-Lisboa}
      ALDI_CITY: ${ALDI_CITY:-Lisboa}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-}
      # Rede com inspeção TLS (apenas dev — nunca em produção).
      FOLHETO_INSECURE_TLS: ${FOLHETO_INSECURE_TLS:-0}
    volumes:
      # Credenciais Google Drive / FCM (não vão para o git).
      - ./scraper/credentials:/app/credentials:ro
    ports:
      - "8090:8090"

  # Vigia a pasta do Google Drive e processa PDFs novos automaticamente
  # (espera 2 min após o upload). Corre o pipeline IN-PROCESS — não chama o
  # worker HTTP — por isso precisa das mesmas credenciais que o scraper.
  drive-scheduler:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: folhetosmart-drive-scheduler
    command: python scheduler_drive.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgresql://${POSTGRES_USER:-folheto}:${POSTGRES_PASSWORD:-folheto}@postgres:5432/${POSTGRES_DB:-folhetosmart}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_CREDENTIALS_PATH: ${GOOGLE_DRIVE_CREDENTIALS_PATH:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-}
      # Rede com inspeção TLS (apenas dev — nunca em produção).
      FOLHETO_INSECURE_TLS: ${FOLHETO_INSECURE_TLS:-0}
    volumes:
      - ./scraper/credentials:/app/credentials:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: folhetosmart-nginx
    profiles: ["prod"]             # produção: docker compose --profile prod up -d
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/hetzner/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: folhetosmart-pgadmin
    profiles: ["tools"]            # só arranca com: docker compose --profile tools up
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@folhetosmart.pt
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
