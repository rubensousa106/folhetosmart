spring:
  application:
    name: folhetosmart-backend

  datasource:
    # Precedência: SPRING_DATASOURCE_URL (docker-compose) > DB_* (Render, que
    # injeta host/port/database/user/password da BD) > defaults locais.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:folhetosmart}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:folheto}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:folheto}}

  jpa:
    hibernate:
      ddl-auto: validate          # o schema é gerido pelo Flyway, não pelo Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true     # tolera BD já inicializada por db/init.sql

  jackson:
    # Toda a API usa snake_case (product_ids, total_otimizado, ...) como no spec.
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      # Upload manual de folhetos em PDF (Fix 3).
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080
  # Atrás de proxy com TLS no edge (Render, nginx): honra o X-Forwarded-Proto,
  # senão require-https=true vê HTTP e entra em loop de redirect.
  forward-headers-strategy: framework

# --- Configuração da aplicação ---
folheto:
  jwt:
    # Segredo em base64 (>= 256 bits). Em produção vem de variável de ambiente.
    secret: ${FOLHETO_JWT_SECRET:ZmFsaGV0by1zbWFydC1kZXYtc2VjcmV0LWNoYW5nZS1tZS1wbGVhc2UtMzJi}
    # Validade do access token em milissegundos (24h).
    expiration-ms: 86400000
    # Validade do refresh token em milissegundos (30 dias).
    refresh-expiration-ms: 2592000000
  security:
    # Em produção: true (rejeita HTTP). Em dev local: false.
    require-https: ${FOLHETO_REQUIRE_HTTPS:false}
  admin:
    # Conta de administrador criada/promovida no arranque (ver AdminBootstrap).
    # No Render define-se no painel; em dev local fica vazio.
    email: ${FOLHETO_ADMIN_EMAIL:}
    password: ${FOLHETO_ADMIN_PASSWORD:}
  password-reset:
    # Webhook do n8n que envia o email com a palavra-passe temporária. Vazio em
    # dev -> o backend regista a password no log em vez de a enviar.
    webhook-url: ${N8N_PASSWORD_RESET_WEBHOOK:}
    # Validade da palavra-passe temporária, em minutos (1 hora por omissão).
    ttl-minutes: ${PASSWORD_RESET_TTL_MIN:60}

# ============================================================
# ACTUATOR - Health Check para o Render
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# ============================================================
# LOGGING - Mais detalhes para diagnóstico
# ============================================================
logging:
  level:
    pt.folhetosmart: DEBUG
    org.springframework.boot: INFO
    org.springframework.web: DEBUG
