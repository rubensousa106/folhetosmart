# =====================================================================
# Blueprint do FolhetoSmart para o plano GRATUITO do Render.
#
# Sobe a API (backend Spring Boot, via Docker) + PostgreSQL. A extração semanal
# dos folhetos corre no GitHub Actions (.github/workflows/produce-flyers.yml) — e
# não aqui — porque precisa de mais RAM/tempo do que os 512 MB do plano grátis.
# Mantém-se o modelo "processar 1×/semana no servidor (CI), ler N× pelos utilizadores".
#
# Redeploy: ao subir uma nova imagem, o Flyway corre as migrações pendentes no
# arranque (ex.: V11__shopping_items.sql — lista de compras sincronizada) e o
# SecurityConfig passa a aplicar o CORS para a web (folhetosmart.pt). Não é
# preciso configurar mais nada para a Lista web<->telemóvel funcionar.
#
# Limitações do plano grátis (ver deploy/render/README.md):
#   - o web service adormece após 15 min sem tráfego (1.º pedido é lento);
#   - a base de dados grátis é apagada ~30 dias após criação.
# =====================================================================

databases:
  - name: folhetosmart-db
    databaseName: folhetosmart
    user: folheto
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: folhetosmart-backend
    runtime: docker
    repo: https://github.com/rubensousa106/folhetosmart
    branch: master
    region: frankfurt
    plan: free
    # O backend é Java/Spring Boot; build pela imagem Docker (escuta na porta 8080).
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      # --- Ligação à base de dados gerida (injetada pelo Render) ---
      - key: DB_HOST
        fromDatabase:
          name: folhetosmart-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: folhetosmart-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: folhetosmart-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: folhetosmart-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: folhetosmart-db
          property: password

      # --- Segurança ---
      - key: FOLHETO_REQUIRE_HTTPS
        value: "true"                  # o Render termina TLS no edge
      - key: FOLHETO_JWT_SECRET
        sync: false                    # gera com: openssl rand -base64 48

      # --- Conta de administrador (criada no arranque por AdminBootstrap) ---
      - key: FOLHETO_ADMIN_EMAIL
        sync: false
      - key: FOLHETO_ADMIN_PASSWORD
        sync: false

      # --- Cloudflare R2: o backend assina os URLs de upload de folhetos
      #     (POST /api/v1/admin/flyer-upload-url). Sem isto devolve 503. ---
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        value: folhetosmart
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

      # --- JVM dentro dos 512 MB do plano grátis ---
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=75.0"
