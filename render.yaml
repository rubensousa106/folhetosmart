# =====================================================================
# Blueprint do FolhetoSmart para o plano GRATUITO do Render.
#
# Sobe a API (backend Spring Boot) + PostgreSQL. A extração semanal dos folhetos
# corre no GitHub Actions (.github/workflows/produce-flyers.yml) — e não aqui —
# porque precisa de mais RAM/tempo do que os 512 MB do plano grátis. Mantém-se o
# modelo "processar 1×/semana no servidor (CI), ler N× pelos utilizadores".
#
# NOTA: o runtime/buildCommand abaixo (Python/Tesseract) está desatualizado — o
# backend é Java/Spring Boot (backend/Dockerfile). O deploy real está configurado
# no painel do Render; rever este blueprint se voltar a usar deploy por Blueprint.
#
# Limitações do plano grátis (ver deploy/render/README.md):
#   - o web service adormece após 15 min sem tráfego (1.º pedido é lento);
#   - a base de dados grátis é apagada ~30 dias após criação.
# =====================================================================

databases:
  - name: folhetosmart-db
    databaseName: folhetosmart
    user: folheto
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: folhetosmart-backend
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr tesseract-ocr-por poppler-utils
      pip install -r scraper/requirements.txt
    startCommand: python -m backend.app
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract

      # --- Segurança ---
      - key: FOLHETO_REQUIRE_HTTPS
        value: "true"                  # o Render termina TLS no edge
      - key: FOLHETO_JWT_SECRET
        sync: false                    # gera com: openssl rand -base64 48

      # --- Conta de administrador (criada no arranque por AdminBootstrap) ---
      - key: FOLHETO_ADMIN_EMAIL
        sync: false
      - key: FOLHETO_ADMIN_PASSWORD
        sync: false

      # --- Cloudflare R2: o backend assina os URLs de upload de folhetos
      #     (POST /api/v1/admin/flyer-upload-url). Sem isto devolve 503. ---
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        value: folhetosmart
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

      # --- JVM dentro dos 512 MB do plano grátis ---
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=75.0"

