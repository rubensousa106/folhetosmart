name: Sincronização semanal

# Processa os folhetos 1×/semana (modelo "processar 1×, ler N×"): corre o
# pipeline de scraping + OCR/visão e escreve diretamente na base de dados do
# Render. Corre no GitHub Actions (e não no Render) porque o worker
# Playwright/Tesseract precisa de mais RAM do que o plano grátis oferece.

on:
  schedule:
    # Quinta-feira 09:00 UTC (≈10:00 em Lisboa). Ajusta se necessário.
    - cron: "0 9 * * 4"
  workflow_dispatch:        # permite disparar manualmente a partir do GitHub

# Evita duas execuções em simultâneo (cron + manual).
concurrency:
  group: weekly-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Construir a imagem do scraper
        run: docker build -t folhetosmart-scraper ./scraper

      - name: Correr o pipeline semanal
        env:
          # BD do Render — usa a "External Database URL" (inclui ?sslmode=require).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          ALDI_DISTRICT: ${{ vars.ALDI_DISTRICT || 'Lisboa' }}
          ALDI_CITY: ${{ vars.ALDI_CITY || 'Lisboa' }}
          # Opcionais — salvaguarda de PDFs no Drive e notificações FCM.
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_CREDENTIALS_JSON: ${{ secrets.FCM_CREDENTIALS_JSON }}
        run: |
          docker run --rm \
            -e DATABASE_URL \
            -e ANTHROPIC_API_KEY \
            -e ANTHROPIC_MODEL \
            -e ALDI_DISTRICT -e ALDI_CITY \
            -e GOOGLE_DRIVE_FOLDER_ID -e GOOGLE_DRIVE_CREDENTIALS_JSON \
            -e FCM_PROJECT_ID -e FCM_CREDENTIALS_JSON \
            folhetosmart-scraper \
            python -c "from scrapers import SCRAPERS; from pipeline import run_sync; print(run_sync(list(SCRAPERS)))"
