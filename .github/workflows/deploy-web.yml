# Build + deploy da web (web/) para o Cloudflare Pages.
#
# Secrets necessários no repositório (Settings → Secrets and variables → Actions):
#   - CLOUDFLARE_API_TOKEN   token com permissão "Cloudflare Pages: Edit"
#   - CLOUDFLARE_ACCOUNT_ID  ID da conta Cloudflare
# Variável (repo Variables), opcional — URL do backend usado no build:
#   - NEXT_PUBLIC_API_URL    (ex.: https://folhetosmart.onrender.com)
name: Deploy Web (Cloudflare Pages)

on:
  push:
    branches: [master]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        working-directory: web
        run: npm install

      - name: Build estático
        working-directory: web
        env:
          # Se a variável não existir (ou estiver vazia), usa o backend de produção.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://folhetosmart.onrender.com' }}
        run: npm run build

      - name: Garantir que o projeto Pages existe (cria na 1.ª vez; ignora se já existe)
        working-directory: web
        env:
          # Sem CLOUDFLARE_ACCOUNT_ID de propósito: o wrangler deteta a conta a
          # partir do token. (Pôr a variável a vazio dava /accounts//... → erro 7003.)
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx -y wrangler@3.90.0 pages project create folhetosmart-web --production-branch=master || true

      - name: Deploy para o Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy out --project-name=folhetosmart-web --branch=master --commit-dirty=true
