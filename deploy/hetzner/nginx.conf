# Reverse proxy do backend FolhetoSmart (porta 80/443 -> 8080).
# O Certbot adiciona automaticamente o bloco TLS (listen 443) ao correr:
#   certbot --nginx -d api.folhetosmart.pt
server {
    listen 80;
    server_name api.folhetosmart.pt;

    # Upload de folhetos PDF (admin) pode ser grande.
    client_max_body_size 60M;

    location / {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
